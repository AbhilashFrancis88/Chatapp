<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9b8fe8"/>
      <stop offset="100%" stop-color="#6359b3"/>
    </linearGradient>
    <linearGradient id="bubble1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#f0eeff" stop-opacity="0.95"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Main chat bubble (back) -->
  <rect x="100" y="120" width="240" height="160" rx="32" fill="url(#bubble1)"/>
  <polygon points="140,280 130,320 180,280" fill="#f0eeff" opacity="0.95"/>

  <!-- Three dots in the back bubble -->
  <circle cx="175" cy="200" r="14" fill="#7c6fcd" opacity="0.5"/>
  <circle cx="220" cy="200" r="14" fill="#7c6fcd" opacity="0.65"/>
  <circle cx="265" cy="200" r="14" fill="#7c6fcd" opacity="0.8"/>

  <!-- Front chat bubble (overlapping) -->
  <rect x="172" y="220" width="240" height="150" rx="32" fill="#ffffff" fill-opacity="0.3"/>
  <polygon points="350,370 370,410 330,370" fill="#ffffff" fill-opacity="0.3"/>

  <!-- Lines in front bubble (message text) -->
  <rect x="205" y="265" width="150" height="12" rx="6" fill="#ffffff" fill-opacity="0.7"/>
  <rect x="205" y="295" width="110" height="12" rx="6" fill="#ffffff" fill-opacity="0.5"/>
  <rect x="205" y="325" width="80" height="12" rx="6" fill="#ffffff" fill-opacity="0.35"/>
</svg>
